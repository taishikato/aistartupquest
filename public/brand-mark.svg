<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" aria-hidden="true">
  <title>SF AI Startup Quest</title>
  <!-- Monitor: black shell -->
  <rect x="7" y="0" width="18" height="9" fill="#0a0a0a"/>
  <!-- Screen -->
  <rect x="9" y="2" width="14" height="5" fill="#ffe66d"/>
  <!-- Teal bezel (matches app sidebar) -->
  <rect x="8" y="1" width="16" height="1" fill="#4ecdc4"/>
  <rect x="8" y="7" width="16" height="1" fill="#4ecdc4"/>
  <rect x="8" y="1" width="1" height="7" fill="#4ecdc4"/>
  <rect x="23" y="1" width="1" height="7" fill="#4ecdc4"/>
  <!-- Screen shine pixels -->
  <rect x="10" y="3" width="1" height="1" fill="#1a1a2e"/>
  <rect x="19" y="3" width="1" height="1" fill="#1a1a2e"/>
  <rect x="14" y="5" width="3" height="1" fill="#1a1a2e"/>
  <!-- Neck -->
  <rect x="14" y="9" width="4" height="1" fill="#9ca3af"/>
  <!-- Robot head (grey, black outline) -->
  <rect x="10" y="10" width="12" height="5" fill="#1f2937"/>
  <rect x="11" y="11" width="10" height="3" fill="#d1d5db"/>
  <rect x="12" y="12" width="8" height="1" fill="#e5e7eb"/>
  <!-- Eyes -->
  <rect x="13" y="13" width="2" height="1" fill="#dc2626"/>
  <rect x="17" y="13" width="2" height="1" fill="#dc2626"/>
  <!-- Body -->
  <rect x="11" y="15" width="10" height="7" fill="#1f2937"/>
  <rect x="12" y="16" width="8" height="5" fill="#9ca3af"/>
  <rect x="13" y="17" width="6" height="3" fill="#b8bcc4"/>
  <!-- Arms -->
  <rect x="9" y="16" width="2" height="4" fill="#9ca3af"/>
  <rect x="21" y="16" width="2" height="4" fill="#9ca3af"/>
  <rect x="9" y="16" width="2" height="1" fill="#1f2937"/>
  <rect x="21" y="16" width="2" height="1" fill="#1f2937"/>
  <!-- Legs -->
  <rect x="12" y="22" width="3" height="5" fill="#1f2937"/>
  <rect x="17" y="22" width="3" height="5" fill="#1f2937"/>
  <rect x="13" y="22" width="2" height="5" fill="#9ca3af"/>
  <rect x="17" y="22" width="2" height="5" fill="#9ca3af"/>
  <!-- Feet -->
  <rect x="11" y="27" width="10" height="2" fill="#1f2937"/>
  <rect x="12" y="27" width="8" height="2" fill="#6b7280"/>
</svg>
